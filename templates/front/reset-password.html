<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'front/share/navbar.html' %}

    <main class="bg-light py-5 min-vh-100 d-flex align-items-center">
        <div class="container">
            <div class="auth-container">
                <div class="ui-card p-4 p-md-5">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center bg-light text-dark border rounded-circle mb-3" style="width: 60px; height: 60px;">
                            <i class="bi bi-shield-lock fs-3"></i>
                        </div>
                        <h2 class="fw-bold mb-2">Create New Password</h2>
                        <p class="text-muted">Enter your new secure password below.</p>
                    </div>
                    
                    <form action="{{ url_for('reset_password', token=token) }}" method="POST" class="needs-validation" novalidate>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">New Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                            <div class="invalid-feedback">Password must be at least 6 characters long.</div>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm New Password</label>
                            <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                            <div class="invalid-feedback">Please confirm your new password.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-dark btn-lg w-100 rounded-pill py-3 mb-4 shadow-sm">Save Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    {% include 'front/share/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    var password = document.getElementById('password');
                    var confirmPassword = document.getElementById('confirm_password');
                    
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                        Swal.fire({
                            icon: 'warning',
                            title: 'Validation Failed',
                            text: 'Please enter valid passwords.',
                            confirmButtonColor: '#111111'
                        });
                    } else if (password.value !== confirmPassword.value) {
                        event.preventDefault()
                        event.stopPropagation()
                        Swal.fire({
                            icon: 'error',
                            title: 'Password Mismatch',
                            text: 'Passwords do not match.',
                            confirmButtonColor: '#111111'
                        });
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
